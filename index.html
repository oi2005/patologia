<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE - Sistema de Aprendizagem e Mapeamento Epistemológico</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --accent-success: #2ea44f;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 5px 0;
            color: #f0f6fc;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .workspace { grid-template-columns: 1fr; }
        }

        .panel {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin: 0;
        }

        textarea {
            width: 100%;
            height: 380px;
            background-color: var(--bg-primary);
            color: #79c0ff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 12px;
            padding: 10px;
            resize: none;
            box-sizing: border-box;
        }

        button {
            background-color: var(--accent-success);
            color: #ffffff;
            border: 1px solid rgba(240, 246, 252, 0.1);
            border-radius: 6px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #2c974b; }

        .output-container {
            height: 440px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-right: 4px;
        }

        .estagio-bloco {
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-primary);
            overflow: hidden;
        }

        .estagio-header {
            background-color: rgba(88, 166, 255, 0.1);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 12px;
            font-size: 12px;
            font-weight: bold;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
        }

        .card-topico {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .card-topico:last-child { border-bottom: none; }

        .topico-title {
            font-size: 14px;
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 4px;
        }

        .topico-desc {
            font-size: 13px;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .topico-meta {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
        }

        .badge {
            background-color: var(--border-color);
            padding: 2px 6px;
            border-radius: 3px;
            color: var(--text-main);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SAGE</h1>
        <p class="subtitle">Sistema de Aprendizagem e Mapeamento Epistemológico Curricular</p>
    </header>

    <div class="workspace">
        <div class="panel">
            <h2 class="panel-title">Matriz de Dados (JSON)</h2>
            <textarea id="json-input">[
  {
    "id": "introducao_celular",
    "nome": "Introdução à Citologia",
    "desc": "Estudo da morfologia, organelas e estruturas básicas da célula viva.",
    "requisitos": []
  },
  {
    "id": "bioquimica_estrutural",
    "nome": "Bioquímica Estrutural",
    "desc": "Análise de macromoléculas, proteínas, lipídeos e carboidratos estruturais.",
    "requisitos": []
  },
  {
    "id": "metabolismo_energetico",
    "nome": "Metabolismo Energético",
    "desc": "Cinética enzimática, Ciclo de Krebs e fosforilação oxidativa mitocondrial.",
    "requisitos": ["bioquimica_estrutural", "introducao_celular"]
  },
  {
    "id": "genetica_molecular",
    "nome": "Genética Molecular",
    "desc": "Mecanismos de replicação do DNA, transcrição, tradução e síntese proteica.",
    "requisitos": ["introducao_celular"]
  },
  {
    "id": "fisiologia_sistemica",
    "nome": "Fisiologia Sistêmica",
    "desc": "Integração dos sistemas orgânicos, regulação neuroendócrina e homeostase.",
    "requisitos": ["metabolismo_energetico"]
  },
  {
    "id": "patologia_clinica",
    "nome": "Patologia Clínica Diagnóstica",
    "desc": "Mecanismos de lesão celular, resposta inflamatória e disfunções orgânicas.",
    "requisitos": ["fisiologia_sistemica", "genetica_molecular"]
  }
]</textarea>
            <button onclick="processarEmenta()">Compilar Trilha Cognitiva</button>
        </div>

        <div class="panel">
            <h2 class="panel-title">Trilha Cronológica de Aprendizagem</h2>
            <div id="output" class="output-container">
                </div>
        </div>
    </div>
</div>

<script>
function processarEmenta() {
    const outputDiv = document.getElementById('output');
    outputDiv.innerHTML = '';

    let dados;
    try {
        dados = JSON.parse(document.getElementById('json-input').value);
    } catch (e) {
        outputDiv.innerHTML = `<div style="color: #ff7b72; font-size: 13px;">Erro de Sintaxe: Certifique-se de que o JSON está formatado corretamente.</div>`;
        return;
    }

    // Criação das estruturas de dados para o Grafo
    const nos = {};
    const adjacencia = {};
    const grauEntrada = {};

    dados.forEach(item => {
        nos[item.id] = item;
        adjacencia[item.id] = [];
        grauEntrada[item.id] = 0;
    });

    // Mapeamento das arestas (dependências)
    dados.forEach(item => {
        item.requisitos.forEach(req => {
            if (adjacencia[req]) {
                adjacencia[req].push(item.id);
                grauEntrada[item.id]++;
            }
        });
    });

    // Algoritmo de Kahn (Ordenação Topológica por Camadas)
    let fila = [];
    for (const id in grauEntrada) {
        if (grauEntrada[id] === 0) fila.push(id);
    }

    let estagioNum = 1;
    let nosProcessados = 0;

    while (fila.length > 0) {
        let proximaFila = [];
        
        // Bloco HTML do estágio atual
        const estagioBloco = document.createElement('div');
        estagioBloco.className = 'estagio-bloco';
        
        const estagioHeader = document.createElement('div');
        estagioHeader.className = 'estagio-header';
        estagioHeader.innerHTML = `<span>ESTÁGIO CRONOLÓGICO ${String(estagioNum).padStart(2, '0')}</span> <span class="badge">Nível ${estagioNum}</span>`;
        estagioBloco.appendChild(estagioHeader);

        fila.forEach(id => {
            nosProcessados++;
            const item = nos[id];
            
            const card = document.createElement('div');
            card.className = 'card-topico';
            
            const reqsTxt = item.requisitos.length > 0 ? `Pré-requisitos: ${item.requisitos.join(', ').toUpperCase()}` : 'Conceito Base Introdutório';
            
            card.innerHTML = `
                <div class="topico-title">${item.nome.toUpperCase()}</div>
                <div class="topico-desc">${item.desc}</div>
                <div class="topico-meta">🔬 Correlação: ${reqsTxt}</div>
            `;
            estagioBloco.appendChild(card);

            // Atualiza os graus de entrada dos nós vizinhos
            adjacencia[id].forEach(vizinho => {
                grauEntrada[vizinho]--;
                if (grauEntrada[vizinho] === 0) {
                    proximaFila.push(vizinho);
                }
            });
        });

        outputDiv.appendChild(estagioBloco);
        fila = proximaFila;
        estagioNum++;
    }

    if (nosProcessados !== dados.length) {
        outputDiv.innerHTML = `<div style="color: #ff7b72; font-size: 13px;">Erro Crítico: Detectada dependência cíclica infinita na ementa.</div>`;
    }
}

// Execução inicial
window.onload = processarEmenta;
</script>
</body>
</html>
